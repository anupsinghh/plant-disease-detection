<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        .btn-upload {
            background-color: #28a745;
            color: white;
        }
        .btn-upload:hover {
            background-color: #218838;
        }
        .image-preview {
            margin-top: 20px;
            display: none;
            width: 100%;
            max-height: 300px;
            border-radius: 5px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="mb-4">🌿 Plant Disease Detection</h2>
        <form id="uploadForm">
            <input type="file" id="imageInput" class="form-control mb-3" required accept="image/*" onchange="previewImage(event)">
            <img id="preview" class="image-preview">
            <button type="button" class="btn btn-upload mt-3 w-100" onclick="predictDisease()">Predict</button>
        </form>

        <div id="resultContainer" class="mt-4" style="display: none;">
            <h4 class="text-success">Prediction: <span id="resultText"></span></h4>
            <img id="resultImage" class="img-fluid mt-2" style="max-width: 100%; border-radius: 5px;">
        </div>
    </div>

    <script>
        function previewImage(event) {
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(event.target.files[0]);
            preview.style.display = 'block';
        }

        async function predictDisease() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files.length) {
                alert("Please select an image first.");
                return;
            }

            let formData = new FormData();
            formData.append("image", fileInput.files[0]);

            const response = await fetch("https://plant-disease-detection-eight.vercel.app/", { // ✅ Change this URL
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById("resultContainer").style.display = "block";
                document.getElementById("resultText").innerText = data.prediction;
                document.getElementById("resultImage").src = data.image; // Ensure backend sends image URL
            } else {
                alert("Error: " + data.error);
            }
        }
    </script>

</body>
</html>
